        h2 { font: var(--text-h2); }
        h3, h4 { color: var(--text-heading); margin: 0; }
        a { color: var(--text-link); font-weight: 600; text-decoration: none; }
        a:hover { color: var(--bf-orange); text-decoration: underline; }
        svg { flex-shrink: 0; }

        .page-header__wordmark { font: 800 15px/1 var(--font-display); color: var(--bf-orange); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--space-5); }

        .page-header h1 svg { color: var(--bf-orange); }

        .metadata { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-3); margin-top: var(--space-6); }
        .stat-card { background: var(--bf-white); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: var(--space-5); text-align: center; box-shadow: var(--shadow-card); }

        .stat-card p { font: var(--text-caption); color: var(--text-muted); margin-top: 6px; text-transform: uppercase; letter-spacing: var(--tracking-label); }

        /* Content wrapper */
        .content { max-width: var(--page-max-width); margin: 0 auto; padding: var(--space-6) var(--page-gutter) var(--space-10); display: grid; gap: var(--space-6); }

        .filters { background: var(--bf-white); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: var(--space-5); display: flex; flex-wrap: wrap; gap: var(--space-6); align-items: center; }

            border-radius: var(--radius-control); cursor: pointer;
            border: 1px solid var(--border-control); background: var(--bf-white); color: var(--bf-ink);

        .filter-btn.active, .lang-global-btn.active {
            background: var(--bf-orange); border-color: var(--bf-orange); color: var(--bf-white);
        }

        /* Grid */
        .equipment-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: var(--space-5); }

        .equipment-card {

            border-radius: var(--radius-lg); overflow: hidden;

        .card-image { width: 100%; height: 220px; object-fit: contain; background: var(--bf-grey-1); display: block; padding: var(--space-3); }

        .card-header { margin-bottom: var(--space-4); }
        .card-title { font: var(--text-h3); color: var(--bf-ink); margin-bottom: 4px; }

        .section-label { color: var(--text-muted); margin-bottom: var(--space-2); font: var(--text-label); text-transform: uppercase; letter-spacing: var(--tracking-label); }

        .link-btn:hover { background: var(--bf-purple-dark); color: var(--bf-white); text-decoration: none; }
        .link-meta { font: var(--text-caption); color: var(--text-muted); margin-top: 6px; display: flex; align-items: center; gap: 6px; }

        .link-note { font: var(--text-caption); color: var(--text-muted); margin-top: 4px; font-style: italic; display: flex; align-items: flex-start; gap: 6px; }

            .page-header h1 { font-size: 1.6em; }
            .metadata { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>

                            </div>
                        </div>

                        <div class="card-section">
                            <h4 class="section-label">Мануалы (${equipment.manuals ? equipment.manuals.length : 0})</h4>
                            ${equipment.manuals && equipment.manuals.length > 0 ? `
                                <div class="links">
                                    ${equipment.manuals.map(m => `
                                        <div class="link-block">
                                            <a href="${m.url}" target="_blank" class="link-btn">
                                                ${icon('external-link', 14)} Мануал (${m.language})${m.type ? ` [${m.type.toUpperCase()}]` : ''}
                                            </a>
                                            ${m.searchTerm ? `<div class="link-note">${icon('info', 14)} На старонцы ўвядзіце ў пошук: <strong>${m.searchTerm}</strong></div>` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                            ` : '<p class="description">Мануалы адсутнічаюць</p>'}
                        </div>

                        <div class="card-section">
                            <h4 class="section-label">Відэа (${videos.length})</h4>
                            ${videos.length > 0 ? `
                                <div class="links">
                                    ${videos.map(v => `
                                        <div class="link-block">
                                            <a href="${v.url}" target="_blank" class="link-btn">
                                                ${icon('play', 14)} ${v.title}
                                            </a>
                                            ${v.duration ? `<div class="link-meta">${icon('clock', 14)} Працягласць: ${v.duration}</div>` : ''}
                                            ${v.note ? `<div class="link-note">${icon('info', 14)} ${v.note}</div>` : ''}
                                            ${v.type ? `<div class="link-meta">Тып: ${v.type}</div>` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                            ` : '<p class="description">Відэа адсутнічаюць</p>'}
                        </div>
                    </div>
                </article>
            `;
        }

        // Фільтрацыя па катэгорыях
        let currentFilter = 'all';
        const filterButtons = document.querySelectorAll('.filter-btn');
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderEquipment();
            });
        });

        // Адлюстраванне абсталявання
        function renderEquipment() {
            const grid = document.getElementById('equipmentGrid');
            const filtered = currentFilter === 'all'
                ? window.equipmentData
                : window.equipmentData.filter(e => e.category === currentFilter);

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">Трэнажоры не знойдзены</div>';
                return;
            }

            grid.innerHTML = filtered.map(eq => renderEquipmentCard(eq)).join('');
        }

        // Ініцыялізацыя
        function init() {
            const data = embeddedData;
            if (!data) {
                document.getElementById('equipmentGrid').innerHTML =
                    '<div class="no-results">Памылка загрузкі дадзеных.</div>';
                return;
            }

            window.equipmentData = data.equipment;
            renderMetadata(data.metadata);
            renderEquipment();
        }

        init();
    </script>
</body>
</html>
