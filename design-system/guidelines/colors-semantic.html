<!-- @dsCard group="Colors" viewport="700x150" name="Semantic" subtitle="Status only: success, info, danger + tints" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:16px;display:flex;gap:8px;">
<div style="flex:1;background:var(--bf-success);border-radius:8px;color:#fff;padding:10px;font:600 12px/1.3 var(--font-sans);display:flex;align-items:flex-end;">success #1E8A4C</div>
<div style="flex:.7;background:var(--bf-success-tint);border-radius:8px;color:var(--bf-success);padding:10px;font:600 12px/1.3 var(--font-sans);display:flex;align-items:flex-end;">tint</div>
<div style="flex:1;background:var(--bf-info);border-radius:8px;color:#fff;padding:10px;font:600 12px/1.3 var(--font-sans);display:flex;align-items:flex-end;">info #2A6FDB</div>
<div style="flex:.7;background:var(--bf-info-tint);border-radius:8px;color:var(--bf-info);padding:10px;font:600 12px/1.3 var(--font-sans);display:flex;align-items:flex-end;">tint</div>
<div style="flex:1;background:var(--bf-danger);border-radius:8px;color:#fff;padding:10px;font:600 12px/1.3 var(--font-sans);display:flex;align-items:flex-end;">danger #D23B2E</div>
<div style="flex:.7;background:var(--bf-danger-tint);border-radius:8px;color:var(--bf-danger);padding:10px;font:600 12px/1.3 var(--font-sans);display:flex;align-items:flex-end;">tint</div>
</body></html>
