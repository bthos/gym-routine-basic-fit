<!-- @dsCard group="Spacing" viewport="700x180" name="Radius & shadows" subtitle="Sharp cards (0), 4px controls, 6px buttons — nothing pill-shaped" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:20px;display:flex;gap:16px;align-items:center;justify-content:center;background:var(--bf-sand);">
<div style="width:130px;height:100px;background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-card);display:flex;align-items:center;justify-content:center;font:var(--text-caption);color:var(--bf-ink-3);">card · 0</div>
<div style="height:44px;padding:0 22px;background:#fff;border:1px solid var(--border-control);border-radius:var(--radius-control);display:flex;align-items:center;font:600 14px/1 var(--font-sans);color:var(--bf-ink);">control · 4</div>
<div style="height:44px;padding:0 22px;background:var(--bf-orange);border:1px solid var(--bf-orange);border-radius:var(--radius-control);display:flex;align-items:center;font:600 14px/1 var(--font-sans);color:#fff;">active · 4</div>
<div style="height:44px;padding:0 26px;background:var(--bf-purple);border-radius:var(--radius-btn);display:flex;align-items:center;font:700 14px/1 var(--font-sans);letter-spacing:.04em;color:#fff;">BUTTON · 6</div>
<div style="width:110px;height:100px;background:#fff;border:1px solid var(--bf-ink);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font:700 11px/1 var(--font-sans);letter-spacing:.05em;color:var(--bf-ink);">TAG · 2</div>
</body></html>
