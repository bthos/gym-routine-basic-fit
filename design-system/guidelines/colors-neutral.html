<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Ink to white — text, borders, surfaces" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:16px;display:flex;gap:8px;">
<div style="flex:1;background:var(--bf-ink);border-radius:8px;color:#fff;padding:10px;font:600 11px/1.3 var(--font-sans);display:flex;align-items:flex-end;">ink #2D2D2D</div>
<div style="flex:1;background:var(--bf-ink-2);border-radius:8px;color:#fff;padding:10px;font:600 11px/1.3 var(--font-sans);display:flex;align-items:flex-end;">ink-2 #4A4A4A</div>
<div style="flex:1;background:var(--bf-ink-3);border-radius:8px;color:#fff;padding:10px;font:600 11px/1.3 var(--font-sans);display:flex;align-items:flex-end;">ink-3 #757575</div>
<div style="flex:1;background:var(--bf-grey-4);border-radius:8px;color:#fff;padding:10px;font:600 11px/1.3 var(--font-sans);display:flex;align-items:flex-end;">grey-4 #B5B5B5</div>
<div style="flex:1;background:var(--bf-grey-3);border-radius:8px;padding:10px;font:600 11px/1.3 var(--font-sans);color:var(--bf-ink-2);display:flex;align-items:flex-end;">grey-3 #D9D9D9</div>
<div style="flex:1;background:var(--bf-grey-2);border-radius:8px;padding:10px;font:600 11px/1.3 var(--font-sans);color:var(--bf-ink-2);display:flex;align-items:flex-end;">grey-2 #EBEBEB</div>
<div style="flex:1;background:var(--bf-grey-1);border:1px solid var(--bf-grey-2);border-radius:8px;padding:10px;font:600 11px/1.3 var(--font-sans);color:var(--bf-ink-2);display:flex;align-items:flex-end;">grey-1 #F5F5F5</div>
<div style="flex:1;background:#fff;border:1px solid var(--bf-grey-2);border-radius:8px;padding:10px;font:600 11px/1.3 var(--font-sans);color:var(--bf-ink-2);display:flex;align-items:flex-end;">white</div>
</body></html>
