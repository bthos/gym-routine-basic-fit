<!-- @dsCard group="Colors" viewport="700x150" name="Brand orange" subtitle="#F36F21 + interaction shades and tints" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:16px;display:flex;gap:8px;">
<div style="flex:1.6;background:var(--bf-orange);border-radius:8px;color:#fff;padding:10px;font:600 12px/1.3 var(--font-sans);display:flex;flex-direction:column;justify-content:flex-end;">--bf-orange<br>#F36F21</div>
<div style="flex:1;background:var(--bf-orange-dark);border-radius:8px;color:#fff;padding:10px;font:600 12px/1.3 var(--font-sans);display:flex;flex-direction:column;justify-content:flex-end;">dark<br>#D85A0F</div>
<div style="flex:1;background:var(--bf-orange-deep);border-radius:8px;color:#fff;padding:10px;font:600 12px/1.3 var(--font-sans);display:flex;flex-direction:column;justify-content:flex-end;">deep<br>#B84A08</div>
<div style="flex:1;background:var(--bf-orange-tint-2);border-radius:8px;color:var(--bf-orange-deep);padding:10px;font:600 12px/1.3 var(--font-sans);display:flex;flex-direction:column;justify-content:flex-end;">tint-2<br>#FCDCC5</div>
<div style="flex:1;background:var(--bf-orange-tint);border:1px solid var(--bf-grey-2);border-radius:8px;color:var(--bf-orange-deep);padding:10px;font:600 12px/1.3 var(--font-sans);display:flex;flex-direction:column;justify-content:flex-end;">tint<br>#FEF0E6</div>
</body></html>
