<!-- @dsCard group="Rutina App" viewport="420x820" name="Rutina App — interactive" subtitle="Routine page + equipment catalog, rebranded Basic-Fit" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Basic-Fit — Rutina App</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="kit-data.js"></script>
<style>
  body { background: var(--bf-grey-1); }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body style="margin:0;">
<div id="root"></div>
<script type="text/babel" src="RoutineScreen.jsx"></script>
<script type="text/babel" src="CatalogScreen.jsx"></script>
<script type="text/babel">
function App() {
  const [screen, setScreen] = React.useState(localStorage.getItem("bf_kit_screen") || "rutina");
  const pick = (s) => { setScreen(s); localStorage.setItem("bf_kit_screen", s); window.scrollTo(0, 0); };
  const tab = (id, label) => (
    <button onClick={() => pick(id)} style={{
      padding: "8px 18px", borderRadius: 999, border: "none", cursor: "pointer",
      font: "700 13px/1.2 var(--font-sans)",
      background: screen === id ? "var(--bf-orange)" : "transparent",
      color: screen === id ? "#fff" : "rgba(255,255,255,.8)",
    }}>{label}</button>
  );
  const Screen = screen === "rutina" ? window.RoutineScreen : window.CatalogScreen;
  return (
    <div>
      <div style={{
        background: "var(--bf-ink)", display: "flex", gap: 6, justifyContent: "center",
        padding: "10px var(--page-gutter)", borderBottom: "1px solid rgba(255,255,255,.1)",
      }}>
        <span style={{ font: "800 13px/1 var(--font-display)", color: "var(--bf-orange)", textTransform: "uppercase", letterSpacing: ".06em", alignSelf: "center", marginRight: 8 }}>Basic-Fit</span>
        {tab("rutina", "Rutina")}
        {tab("catalogo", "Catálogo")}
      </div>
      <Screen />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
